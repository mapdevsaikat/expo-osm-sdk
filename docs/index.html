<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Expo OSM SDK — Documentation</title>
  <meta name="description" content="Public documentation for the expo-osm-sdk open-source project.">
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f8fafc;
      --text: #0f172a;
      --muted: #475569;
      --link: #2563eb;
      --card: #ffffff;
      --border: #e2e8f0;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f172a;
        --text: #f1f5f9;
        --muted: #94a3b8;
        --link: #60a5fa;
        --card: #1e293b;
        --border: #334155;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.6;
      color: var(--text);
      background: var(--bg);
      padding: 1.5rem;
    }
    main {
      max-width: 42rem;
      margin: 0 auto;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2rem 1.5rem;
    }
    h1 {
      margin: 0 0 0.5rem;
      font-size: 1.75rem;
      line-height: 1.25;
    }
    p { margin: 0 0 1rem; color: var(--muted); }
    ul { margin: 0; padding-left: 1.25rem; }
    li { margin-bottom: 0.75rem; }
    a {
      color: var(--link);
      text-decoration: underline;
      text-underline-offset: 2px;
    }
    a:hover { text-decoration-thickness: 2px; }
    .label {
      display: inline-block;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.25rem;
    }
  </style>
</head>
<body>
  <main>
    <h1>Expo OSM SDK</h1>
    <p>Open-source React Native / Expo map library and demo apps.</p>
    <ul>
      <li>
        <span class="label">Privacy policy</span><br>
        <a href="privacy-policy.html">Expo OSM Demo — Privacy Policy</a>
      </li>
      <li>
        <span class="label">Source code</span><br>
        <a href="https://github.com/mapdevsaikat/expo-osm-sdk">github.com/mapdevsaikat/expo-osm-sdk</a>
      </li>
    </ul>
  </main>
</body>
</html>
